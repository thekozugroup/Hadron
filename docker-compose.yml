services:
  hadron:
    build:
      context: .
      dockerfile: Dockerfile
    image: hadron:latest
    container_name: hadron
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in .env or your shell}
      - HADRON_DATA=/data
      - LLM_CALL_TIMEOUT=300
    restart: unless-stopped
